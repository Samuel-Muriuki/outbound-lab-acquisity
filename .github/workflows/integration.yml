name: Integration Tests

# Runs the live-API integration tests against acquisity.ai (Agent 1
# tool-use loop, real Groq + Gemini + OpenRouter chain, real Tavily
# search, real outbound fetch). Catches regressions that the mocked
# unit tests can't see — provider-API shape changes, prompt-side
# Zod-rejection regressions, breaking changes in the tool definitions.
#
# Schedule: 04:30 UTC daily. Off-peak for free-tier provider quotas.
# Also triggerable manually from the Actions tab via workflow_dispatch.
#
# Cost: ~0. Groq + Gemini + OpenRouter are all free-tier; Tavily free
# tier is 1k req/mo so 1/day is comfortably within budget. The test
# uses ~3-6 search calls per run.

on:
  schedule:
    - cron: "30 4 * * *"
  workflow_dispatch:

# A failed run shouldn't block other CI runs from cancelling.
concurrency:
  group: integration-${{ github.ref }}
  cancel-in-progress: false

jobs:
  integration:
    name: live agent tests
    runs-on: ubuntu-latest
    timeout-minutes: 15

    env:
      RUN_INTEGRATION_TESTS: "1"
      GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
      GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
      OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
      TAVILY_API_KEY: ${{ secrets.TAVILY_API_KEY }}
      # Supabase keys aren't needed by the Agent 1 test (it doesn't
      # touch the DB), but listing them here documents the full set of
      # secrets the project's other workflows / orchestrator paths will
      # eventually want once they're integration-tested too.
      NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
      SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Install Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run integration tests
        run: pnpm test tests/integration/

      - name: Notify on failure
        if: failure()
        run: |
          echo "::warning::Integration tests failed. Check provider API shapes / quotas."
